services:
  web:
    build: .
    container_name: onix_web
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: onix_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onix_db
    volumes:
      - ./database/onix_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"